name: "Docs: PR Checks"

on:
  pull_request:
    branches: [main]

jobs:
  table-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check markdown table alignment
        run: node scripts/fix-table-alignment.js

  worker-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: worker/yarn.lock

      - run: yarn install --frozen-lockfile
        working-directory: worker

      - run: yarn test
        working-directory: worker

  staging-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: worker/yarn.lock

      - run: yarn install --frozen-lockfile
        working-directory: worker

      - name: Run integration tests against staging
        working-directory: worker
        env:
          TEST_ENV: staging
        run: yarn test:integration

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_NOTIFY_URL: ${{ secrets.SLACK_NOTIFY_URL }}
          SLACK_NOTIFY_TOKEN: ${{ secrets.SLACK_NOTIFY_TOKEN }}
        run: |
          curl -s -d "" \
            "${SLACK_NOTIFY_URL}?token=${SLACK_NOTIFY_TOKEN}&type=ci_failure&channel=alerts&workflow=${GITHUB_WORKFLOW}&repo=${GITHUB_REPOSITORY}&branch=${GITHUB_REF_NAME}&sha=${GITHUB_SHA:0:7}&run_id=${GITHUB_RUN_ID}"

  staging-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: npx playwright install chromium

      - name: Run e2e tests against staging
        env:
          TEST_ENV: staging
        run: yarn test:e2e

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_NOTIFY_URL: ${{ secrets.SLACK_NOTIFY_URL }}
          SLACK_NOTIFY_TOKEN: ${{ secrets.SLACK_NOTIFY_TOKEN }}
        run: |
          curl -s -d "" \
            "${SLACK_NOTIFY_URL}?token=${SLACK_NOTIFY_TOKEN}&type=ci_failure&channel=alerts&workflow=${GITHUB_WORKFLOW}&repo=${GITHUB_REPOSITORY}&branch=${GITHUB_REF_NAME}&sha=${GITHUB_SHA:0:7}&run_id=${GITHUB_RUN_ID}"
